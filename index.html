<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Play 2</title>

<style>
body{font-family:Arial;background:linear-gradient(135deg,#00E5FF,#FF007F);margin:0;padding:10px}
.container{max-width:500px;margin:auto;background:#fff;border-radius:20px;padding:15px}
.menu{display:flex;gap:5px;margin-bottom:10px}
.btn{flex:1;padding:10px;border:none;border-radius:20px;background:#555;color:#fff;cursor:pointer}
.btn.ativo{background:#ff5722}
.jogo{display:none}
.jogo.ativo{display:block}
.tabuleiro{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.celula{height:90px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer}
.damas-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;background:#2c2c2c;padding:5px;border-radius:10px;width:100%;max-width:500px;margin:0 auto}
.casa{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.5rem;min-width:0;overflow:hidden}
.escura{background:#8B4513}
.clara{background:#DEB887}
.selecionada{outline:3px solid yellow;box-shadow:0 0 0 2px orange;border-radius:50%}
.footer{text-align:center;color:#fff;margin-top:10px}
.vitoria-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn 0.5s}
.vitoria-mensagem{font-size:2.5rem;font-weight:bold;text-align:center;background:linear-gradient(45deg,#ff0,#ff6a00,#ff0,#ff00ff);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 1s infinite, bounce 0.5s;text-shadow:0 0 10px rgba(255,255,0,0.5);font-family:'Comic Sans MS',cursive}
@keyframes shine{0%{background-position:0% 50%}100%{background-position:100% 50%}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.forca-desenho{font-family:monospace;font-size:1.2rem;background:#f0f0f0;padding:15px;border-radius:10px;margin:10px 0;white-space:pre;text-align:center;line-height:1.4}
.btn-reiniciar{background:#4CAF50;color:white;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:14px;margin-top:10px}
.btn-reiniciar:hover{background:#45a049}
</style>

</head>
<body>

<div class="container">

<div class="menu">
<button class="btn ativo" onclick="trocar('velha',this)">Velha</button>
<button class="btn" onclick="trocar('forca',this)">Forca</button>
<button class="btn" onclick="trocar('puzzle',this)">Puzzle</button>
<button class="btn" onclick="trocar('damas',this)">Damas</button>
</div>

<!-- VELHA -->
<div id="velha" class="jogo ativo">
<div id="velhaGrid" class="tabuleiro"></div>
<div id="velhaStatus"></div>
<button class="btn-reiniciar" onclick="reiniciarVelha()">🔄 Reiniciar</button>
</div>

<!-- FORCA -->
<div id="forca" class="jogo">
<div id="forcaDesenho" class="forca-desenho"></div>
<div id="palavra" style="font-size:2rem;margin:20px;letter-spacing:10px"></div>
<div id="letras" style="display:flex;flex-wrap:wrap;gap:5px;margin:20px 0"></div>
<div id="forcaStatus"></div>
<button class="btn-reiniciar" onclick="reiniciarForca()">🔄 Reiniciar</button>
</div>

<!-- PUZZLE -->
<div id="puzzle" class="jogo">
<div id="puzzleGrid" class="tabuleiro"></div>
<div id="puzzleStatus"></div>
<button class="btn-reiniciar" onclick="reiniciarPuzzle()">🔄 Reiniciar</button>
</div>

<!-- DAMAS -->
<div id="damas" class="jogo">
<div id="damasGrid" class="damas-grid"></div>
<div id="damasStatus"></div>
<button class="btn-reiniciar" onclick="reiniciarDamas()">🔄 Reiniciar</button>
</div>

</div>

<div class="footer">desenvolvido por Adriano Freitas</div>

<script>

function mostrarVitoria(jogador) {
    let overlay = document.createElement('div');
    overlay.className = 'vitoria-overlay';
    let msg = document.createElement('div');
    msg.className = 'vitoria-mensagem';
    msg.innerText = `PARABÉNS, AGORA VC É UM JUSA! 🎉`;
    overlay.appendChild(msg);
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3000);
}

// MENU
function trocar(id,el){
 document.querySelectorAll('.jogo').forEach(j=>j.classList.remove('ativo'));
 document.getElementById(id).classList.add('ativo');
 document.querySelectorAll('.btn').forEach(b=>b.classList.remove('ativo'));
 el.classList.add('ativo');
}

//////////////////////
// VELHA
let v=['','','','','','','','',''];
let jogoAtivoVelha = true;

function verificarVencedorVelha() {
    const combinacoes = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    for(let combo of combinacoes) {
        if(v[combo[0]] && v[combo[0]] === v[combo[1]] && v[combo[0]] === v[combo[2]]) {
            jogoAtivoVelha = false;
            mostrarVitoria(v[combo[0]]);
            document.getElementById('velhaStatus').innerHTML = `<span style="color:green">${v[combo[0]]} venceu!</span>`;
            return true;
        }
    }
    if(v.every(c => c !== '')) {
        jogoAtivoVelha = false;
        mostrarVitoria('Empate');
        document.getElementById('velhaStatus').innerHTML = `<span style="color:orange">Empate!</span>`;
        return true;
    }
    return false;
}

function drawV(){
 let g=document.getElementById('velhaGrid');g.innerHTML='';
 v.forEach((c,i)=>{
  let d=document.createElement('div');
  d.className='celula';
  d.innerText=c;
  d.onclick=()=>{
   if(!jogoAtivoVelha) return;
   if(v[i]!=='')return;
   v[i]='X';
   drawV();
   if(verificarVencedorVelha()) return;
   setTimeout(()=>{
    let e=v.map((c,i)=>c===''?i:null).filter(x=>x!==null);
    if(e.length && jogoAtivoVelha){
     v[e[Math.floor(Math.random()*e.length)]]='O';
     drawV();
     verificarVencedorVelha();
    }
   },300);
  };
  g.appendChild(d);
 });
}

function reiniciarVelha() {
    v = ['','','','','','','','',''];
    jogoAtivoVelha = true;
    document.getElementById('velhaStatus').innerHTML = '';
    drawV();
}

drawV();

//////////////////////
// FORCA
let palavras = ['HTML', 'JAVA', 'PYTHON', 'JOGO', 'COMPUTADOR', 'PROGRAMAR', 'INTERNET', 'CODIGO'];
let palavraSecreta = palavras[Math.floor(Math.random() * palavras.length)];
let progresso = Array(palavraSecreta.length).fill('_');
let tentativasRestantes = 6;
let letrasUsadas = [];
let forcaLetrasDiv = document.getElementById('letras');

function desenhoForca(erros) {
    const desenhos = [
        `  ------\n  |    |\n  |\n  |\n  |\n  |\n=========`,
        `  ------\n  |    |\n  |    O\n  |\n  |\n  |\n=========`,
        `  ------\n  |    |\n  |    O\n  |    |\n  |\n  |\n=========`,
        `  ------\n  |    |\n  |    O\n  |   /|\n  |\n  |\n=========`,
        `  ------\n  |    |\n  |    O\n  |   /|\\\n  |\n  |\n=========`,
        `  ------\n  |    |\n  |    O\n  |   /|\\\n  |   /\n  |\n=========`,
        `  ------\n  |    |\n  |    O\n  |   /|\\\n  |   / \\\n  |\n=========`
    ];
    return desenhos[erros] || desenhos[6];
}

function atualizarForca() {
    document.getElementById('palavra').innerHTML = progresso.map(l => `<span style="font-size:2rem;margin:0 5px">${l}</span>`).join('');
    document.getElementById('forcaDesenho').innerHTML = `<pre>${desenhoForca(6 - tentativasRestantes)}</pre>`;
    
    if(progresso.join('') === palavraSecreta) {
        document.getElementById('forcaStatus').innerHTML = '<span style="color:green;font-size:1.5rem">🎉 VOCÊ GANHOU! 🎉</span>';
        mostrarVitoria('Jogador');
        desabilitarBotoesForca();
    } else if(tentativasRestantes <= 0) {
        document.getElementById('forcaStatus').innerHTML = `<span style="color:red;font-size:1.5rem">💀 PERDEU! A palavra era ${palavraSecreta} 💀</span>`;
        desabilitarBotoesForca();
    }
}

function desabilitarBotoesForca() {
    document.querySelectorAll('#letras button').forEach(b => b.disabled = true);
}

function criarBotoesForca() {
    forcaLetrasDiv.innerHTML = '';
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l=>{
        let b=document.createElement('button');
        b.innerText=l;
        b.style.padding='10px';
        b.style.cursor='pointer';
        b.style.margin='2px';
        b.style.borderRadius='5px';
        b.onclick=()=>{
            if(letrasUsadas.includes(l) || progresso.join('') === palavraSecreta || tentativasRestantes <= 0) return;
            letrasUsadas.push(l);
            b.disabled=true;
            if(palavraSecreta.includes(l)){
                palavraSecreta.split('').forEach((c,i)=>{if(c===l) progresso[i]=l});
                atualizarForca();
            } else {
                tentativasRestantes--;
                atualizarForca();
            }
        };
        forcaLetrasDiv.appendChild(b);
    });
}

function reiniciarForca() {
    palavraSecreta = palavras[Math.floor(Math.random() * palavras.length)];
    progresso = Array(palavraSecreta.length).fill('_');
    tentativasRestantes = 6;
    letrasUsadas = [];
    document.getElementById('forcaStatus').innerHTML = '';
    criarBotoesForca();
    atualizarForca();
}

criarBotoesForca();
atualizarForca();

//////////////////////
// PUZZLE
let pu = [];

function gerarPuzzleSolucionavel() {
    let nums = [1,2,3,4,5,6,7,8,0];
    do {
        for(let i = nums.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [nums[i], nums[j]] = [nums[j], nums[i]];
        }
    } while(!isSolucionavel(nums));
    return nums;
}

function isSolucionavel(nums) {
    let inversoes = 0;
    for(let i = 0; i < nums.length - 1; i++) {
        if(nums[i] === 0) continue;
        for(let j = i + 1; j < nums.length; j++) {
            if(nums[j] !== 0 && nums[i] > nums[j]) inversoes++;
        }
    }
    return inversoes % 2 === 0;
}

function verificarVitoriaPuzzle() {
    for(let i = 0; i < 8; i++) {
        if(pu[i] !== i+1) return false;
    }
    if(pu[8] !== 0) return false;
    mostrarVitoria('Jogador');
    document.getElementById('puzzleStatus').innerHTML = '<span style="color:green;font-size:1.2rem">🎉 PUZZLE COMPLETO! 🎉</span>';
    return true;
}

function drawP(){
 let g=document.getElementById('puzzleGrid');g.innerHTML='';
 pu.forEach((n,i)=>{
  let d=document.createElement('div');
  d.className='celula';
  d.innerText=n===0?'':n;
  d.style.background=n===0?'#ddd':'#eee';
  d.onclick=()=>{
   let z=pu.indexOf(0);
   let l1=Math.floor(i/3),c1=i%3,l2=Math.floor(z/3),c2=z%3;
   if(Math.abs(l1-l2)+Math.abs(c1-c2)===1){
    [pu[i],pu[z]]=[pu[z],pu[i]];
    drawP();
    verificarVitoriaPuzzle();
   }
  };
  g.appendChild(d);
 });
}

function reiniciarPuzzle() {
    pu = gerarPuzzleSolucionavel();
    document.getElementById('puzzleStatus').innerHTML = '';
    drawP();
}

pu = gerarPuzzleSolucionavel();
drawP();

//////////////////////
// DAMAS
let tab=[],sel=null,vez=true;

function initD(){
 tab=[];
 for(let i=0;i<8;i++){
  tab[i]=[];
  for(let j=0;j<8;j++){
   if((i+j)%2){
    if(i<3)tab[i][j]='b';
    else if(i>4)tab[i][j]='p';
    else tab[i][j]=null;
   } else tab[i][j]=null;
  }
 }
}

function contarPecas() {
    let pecasP = 0, pecasB = 0;
    for(let i=0;i<8;i++) {
        for(let j=0;j<8;j++) {
            if(tab[i][j] === 'p' || tab[i][j] === 'P') pecasP++;
            if(tab[i][j] === 'b' || tab[i][j] === 'B') pecasB++;
        }
    }
    return {pecasP, pecasB};
}

function verificarVitoriaDamas() {
    let {pecasP, pecasB} = contarPecas();
    if(pecasP === 0) {
        mostrarVitoria('Bot (Preto)');
        document.getElementById('damasStatus').innerHTML = '<span style="color:red">⚫ Bot venceu! ⚫</span>';
        return true;
    }
    if(pecasB === 0) {
        mostrarVitoria('Você (Vermelho)');
        document.getElementById('damasStatus').innerHTML = '<span style="color:green">🔴 Você venceu! 🔴</span>';
        return true;
    }
    return false;
}

function coroarDama(i,j,peca) {
    if(peca === 'p' && i === 0) return 'P';
    if(peca === 'b' && i === 7) return 'B';
    return peca;
}

function capturarDama(l, c, peca) {
    let capturas = [];
    let direcoes = [[-1,-1], [-1,1], [1,-1], [1,1]];
    for(let d of direcoes) {
        let passo = 1;
        let encontrouOponente = false;
        let oponenteL, oponenteC;
        while(true) {
            let nl = l + d[0] * passo;
            let nc = c + d[1] * passo;
            if(nl < 0 || nl >= 8 || nc < 0 || nc >= 8) break;
            if(tab[nl][nc] !== null) {
                let ehOponente = false;
                if(peca === 'P') ehOponente = (tab[nl][nc] === 'b' || tab[nl][nc] === 'B');
                if(peca === 'B') ehOponente = (tab[nl][nc] === 'p' || tab[nl][nc] === 'P');
                if(!encontrouOponente && ehOponente) {
                    encontrouOponente = true;
                    oponenteL = nl;
                    oponenteC = nc;
                } else break;
            } else if(encontrouOponente && tab[nl][nc] === null) {
                capturas.push([nl, nc, oponenteL, oponenteC]);
                break;
            } else if(!encontrouOponente && tab[nl][nc] === null) {
                passo++;
                continue;
            } else break;
            passo++;
        }
    }
    return capturas;
}

function capturarNormal(l, c, peca) {
    let capturas = [];
    let direcoes = [[-1,-1], [-1,1], [1,-1], [1,1]];
    for(let d of direcoes) {
        let l1 = l + d[0];
        let c1 = c + d[1];
        let l2 = l + d[0] * 2;
        let c2 = c + d[1] * 2;
        if(l2 >= 0 && l2 < 8 && c2 >= 0 && c2 < 8 && tab[l1] && tab[l1][c1] !== null) {
            let ehOponente = false;
            if(peca === 'p') ehOponente = (tab[l1][c1] === 'b' || tab[l1][c1] === 'B');
            if(peca === 'b') ehOponente = (tab[l1][c1] === 'p' || tab[l1][c1] === 'P');
            if(ehOponente && tab[l2][c2] === null) capturas.push([l2, c2, l1, c1]);
        }
    }
    return capturas;
}

function obterCapturas(l, c, peca) {
    if(peca === 'P' || peca === 'B') return capturarDama(l, c, peca);
    return capturarNormal(l, c, peca);
}

function movimentosDama(l, c) {
    let movs = [];
    let direcoes = [[-1,-1], [-1,1], [1,-1], [1,1]];
    for(let d of direcoes) {
        for(let passo = 1; passo <= 7; passo++) {
            let nl = l + d[0] * passo;
            let nc = c + d[1] * passo;
            if(nl < 0 || nl >= 8 || nc < 0 || nc >= 8) break;
            if(tab[nl][nc] === null) movs.push([nl, nc]);
            else break;
        }
    }
    return movs;
}

function movimentosNormais(l, c, peca) {
    let movs = [];
    if(peca === 'p') {
        if(l-1 >= 0 && c-1 >= 0 && tab[l-1][c-1] === null) movs.push([l-1, c-1]);
        if(l-1 >= 0 && c+1 < 8 && tab[l-1][c+1] === null) movs.push([l-1, c+1]);
    } else if(peca === 'b') {
        if(l+1 < 8 && c-1 >= 0 && tab[l+1][c-1] === null) movs.push([l+1, c-1]);
        if(l+1 < 8 && c+1 < 8 && tab[l+1][c+1] === null) movs.push([l+1, c+1]);
    }
    return movs;
}

function obterMovimentos(l, c, peca) {
    if(peca === 'P' || peca === 'B') return movimentosDama(l, c);
    return movimentosNormais(l, c, peca);
}

function existeCapturaParaJogador() {
    for(let i = 0; i < 8; i++)
        for(let j = 0; j < 8; j++) {
            let peca = tab[i][j];
            if(peca === 'p' || peca === 'P')
                if(obterCapturas(i, j, peca).length > 0) return true;
        }
    return false;
}

function drawD(){
 let g=document.getElementById('damasGrid');g.innerHTML='';
 for(let i=0;i<8;i++){
  for(let j=0;j<8;j++){
   let d=document.createElement('div');
   d.className='casa '+((i+j)%2?'escura':'clara');
   let icone = document.createElement('span');
   icone.style.fontSize = '1.5rem';
   icone.style.display = 'flex';
   icone.style.alignItems = 'center';
   icone.style.justifyContent = 'center';
   icone.style.width = '100%';
   icone.style.height = '100%';
   if(tab[i][j]==='p') icone.innerText = '🔴';
   if(tab[i][j]==='b') icone.innerText = '⚫';
   if(tab[i][j]==='P') icone.innerText = '👑🔴';
   if(tab[i][j]==='B') icone.innerText = '👑⚫';
   d.appendChild(icone);
   if(sel && sel[0]===i && sel[1]===j)d.classList.add('selecionada');
   d.onclick=()=>clickD(i,j);
   g.appendChild(d);
  }
 }
}

function clickD(i,j){
 if(!vez) return;
 let pecaJogador = tab[i][j];
 if(!sel){
   if(pecaJogador === 'p' || pecaJogador === 'P'){
       let precisaCapturar = existeCapturaParaJogador();
       if(precisaCapturar){
           if(obterCapturas(i,j,pecaJogador).length > 0) sel=[i,j];
       } else {
           sel=[i,j];
       }
   }
   drawD(); return;
 }
 let [l,c]=sel;
 let pecaSelecionada = tab[l][c];
 let capturas = obterCapturas(l, c, pecaSelecionada);
 let captura = capturas.find(x => x[0] === i && x[1] === j);
 if(captura){
   tab[i][j] = pecaSelecionada;
   tab[l][c] = null;
   tab[captura[2]][captura[3]] = null;
   tab[i][j] = coroarDama(i,j,tab[i][j]);
   sel = [i,j];
   drawD();
   if(obterCapturas(i,j,tab[i][j]).length > 0) return;
   sel = null;
   vez = false;
   if(verificarVitoriaDamas()) return;
   setTimeout(bot, 400);
   return;
 }
 if(existeCapturaParaJogador()){ sel = null; drawD(); return; }
 let movimentos = obterMovimentos(l, c, pecaSelecionada);
 let movimentoValido = movimentos.some(m => m[0] === i && m[1] === j);
 if(movimentoValido && tab[i][j] === null){
   tab[i][j] = pecaSelecionada;
   tab[l][c] = null;
   tab[i][j] = coroarDama(i,j,tab[i][j]);
   sel = null;
   vez = false;
   drawD();
   if(verificarVitoriaDamas()) return;
   setTimeout(bot, 400);
 }
 sel = null;
 drawD();
}

function bot(){
 if(vez) return;
 for(let i=0;i<8;i++) for(let j=0;j<8;j++){
   let peca = tab[i][j];
   if(peca === 'b' || peca === 'B'){
       let capturas = obterCapturas(i, j, peca);
       if(capturas.length > 0){
           let m = capturas[0];
           tab[m[0]][m[1]] = peca;
           tab[i][j] = null;
           tab[m[2]][m[3]] = null;
           tab[m[0]][m[1]] = coroarDama(m[0], m[1], tab[m[0]][m[1]]);
           vez = true;
           drawD();
           verificarVitoriaDamas();
           if(obterCapturas(m[0], m[1], tab[m[0]][m[1]]).length > 0){
               vez = false;
               setTimeout(bot, 400);
           }
           return;
       }
   }
 }
 for(let i=0;i<8;i++) for(let j=0;j<8;j++){
   let peca = tab[i][j];
   if(peca === 'b') {
       let movs = movimentosNormais(i, j, peca);
       if(movs.length > 0){
           let m = movs[0];
           tab[m[0]][m[1]] = peca;
           tab[i][j] = null;
           tab[m[0]][m[1]] = coroarDama(m[0], m[1], tab[m[0]][m[1]]);
           vez = true;
           drawD();
           verificarVitoriaDamas();
           return;
       }
   } else if(peca === 'B') {
       let movs = movimentosDama(i, j);
       if(movs.length > 0){
           let m = movs[0];
           tab[m[0]][m[1]] = peca;
           tab[i][j] = null;
           vez = true;
           drawD();
           verificarVitoriaDamas();
           return;
       }
   }
 }
 vez = true;
 drawD();
}

function reiniciarDamas() {
    initD();
    sel = null;
    vez = true;
    document.getElementById('damasStatus').innerHTML = '';
    drawD();
}

initD();
drawD();

</script>

</body>
</html>
